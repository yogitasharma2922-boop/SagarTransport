name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Run syntax checks
        run: |
          node --check server.js
          node --check public/app.js
      - name: Run lint (optional)
        run: echo "No lint step configured"
      - name: Run tests (smoke)
        run: |
          npm start -- --silent &
          sleep 10
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/names
          taskkill /F /IM node.exe || true
